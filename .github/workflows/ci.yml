name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn test

  ai-service-tests:
    name: AI service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI service tests
        run: pytest

  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run lint if available
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            pnpm run lint
          else
            echo "No frontend lint script found; skipping."
          fi

      - name: Run build if available
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            pnpm run build
          else
            echo "No frontend build script found; skipping."
          fi

  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t deploypilot-backend-ci ./backend

      - name: Build AI service image
        run: docker build -t deploypilot-ai-service-ci ./ai-service

      - name: Build frontend image if present
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t deploypilot-frontend-ci ./frontend
          else
            echo "No frontend Dockerfile found; skipping."
          fi
