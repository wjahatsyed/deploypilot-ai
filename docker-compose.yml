services:
  postgres:
    image: postgres:16-alpine
    container_name: deploypilot-postgres
    environment:
      POSTGRES_DB: deploypilot
      POSTGRES_USER: deploypilot
      POSTGRES_PASSWORD: deploypilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploypilot -d deploypilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deploypilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    container_name: deploypilot-ai-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: deploypilot-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/deploypilot
      DATABASE_USERNAME: deploypilot
      DATABASE_PASSWORD: deploypilot
      AI_SERVICE_URL: http://ai-service:8000
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: deploypilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
