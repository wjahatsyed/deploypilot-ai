spring:
  application:
    name: deploypilot-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/deploypilot}
    username: ${DATABASE_USERNAME:deploypilot}
    password: ${DATABASE_PASSWORD:deploypilot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
